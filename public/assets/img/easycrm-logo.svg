<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 460" role="img" aria-labelledby="title desc">
  <title id="title">EasyCRM logo</title>
  <desc id="desc">EasyCRM wordmark with a four-part circular symbol and the slogan Exactly What You Need.</desc>
  <defs>
    <linearGradient id="arcBlue" x1="92" y1="44" x2="32" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2587ff"/>
      <stop offset="1" stop-color="#0b63eb"/>
    </linearGradient>
    <linearGradient id="arcTeal" x1="166" y1="44" x2="222" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12c6ad"/>
      <stop offset="1" stop-color="#09b99b"/>
    </linearGradient>
    <linearGradient id="arcGray" x1="222" y1="152" x2="154" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7e2ef"/>
      <stop offset="1" stop-color="#b4c5dd"/>
    </linearGradient>
    <linearGradient id="arcNavy" x1="34" y1="150" x2="102" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1d57"/>
      <stop offset="1" stop-color="#122c6a"/>
    </linearGradient>
    <linearGradient id="crmBlue" x1="1050" y1="95" x2="1448" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c7dff"/>
      <stop offset="1" stop-color="#2b8bff"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-15%" width="124%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#8ea4c5" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="1560" height="460" fill="#ffffff"/>

  <g transform="translate(26 28) scale(1.34)" filter="url(#softShadow)">
    <path d="M112 36 A92 92 0 0 0 36 112" fill="none" stroke="url(#arcBlue)" stroke-width="30" stroke-linecap="round"/>
    <path d="M144 36 A92 92 0 0 1 220 112" fill="none" stroke="url(#arcTeal)" stroke-width="30" stroke-linecap="round"/>
    <path d="M220 144 A92 92 0 0 1 144 220" fill="none" stroke="url(#arcGray)" stroke-width="30" stroke-linecap="round"/>
    <path d="M36 144 A92 92 0 0 0 112 220" fill="none" stroke="url(#arcNavy)" stroke-width="30" stroke-linecap="round"/>

    <circle cx="94" cy="96" r="25" fill="#156ff5"/>
    <circle cx="162" cy="96" r="25" fill="#08bc9d"/>
    <circle cx="162" cy="160" r="25" fill="#c6d3e4"/>
    <circle cx="94" cy="160" r="25" fill="#102964"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" text-rendering="geometricPrecision">
    <text x="456" y="233" font-size="220" font-weight="700" letter-spacing="-5" fill="#102964">Easy</text>
    <text x="958" y="233" font-size="220" font-weight="700" letter-spacing="-5" fill="url(#crmBlue)">CRM</text>
    <text x="456" y="352" font-size="88" font-weight="500" fill="#7c8796">Exactly What You Need</text>
  </g>
</svg>
